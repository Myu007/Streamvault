<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════ THEMES ═══════════ */
:root,[data-theme="dark"]{
  --bg:#07090f;--bg2:#0d1018;--bg3:#131720;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.13);
  --accent:#e63946;--accentglow:rgba(230,57,70,.3);
  --gold:#f4a261;--goldglow:rgba(244,162,97,.25);
  --text:#eef0f6;--text2:#8892a4;--muted:#3d4655;
  --glass:rgba(13,16,24,.72);--glassborder:rgba(255,255,255,.08);
  --r:12px;--shadow:0 24px 64px rgba(0,0,0,.65);
  --pillbg:rgba(10,13,20,.6);--pillborder:rgba(255,255,255,.1);
  --pillactive:rgba(255,255,255,.11);
}
[data-theme="light"]{
  --bg:#f3f5f9;--bg2:#fff;--bg3:#eaecf2;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.14);
  --accent:#e63946;--accentglow:rgba(230,57,70,.18);
  --gold:#d97706;--goldglow:rgba(217,119,6,.18);
  --text:#0f172a;--text2:#475569;--muted:#94a3b8;
  --glass:rgba(255,255,255,.78);--glassborder:rgba(0,0,0,.07);
  --pillbg:rgba(243,245,249,.7);--pillborder:rgba(0,0,0,.1);
  --pillactive:rgba(0,0,0,.07);
}
[data-theme="amoled"]{
  --bg:#000;--bg2:#080808;--bg3:#0f0f0f;
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.1);
  --accent:#e63946;--accentglow:rgba(230,57,70,.28);
  --gold:#f4a261;--goldglow:rgba(244,162,97,.22);
  --text:#eef0f6;--text2:#5a6475;--muted:#2a3040;
  --glass:rgba(0,0,0,.82);--glassborder:rgba(255,255,255,.05);
  --pillbg:rgba(0,0,0,.65);--pillborder:rgba(255,255,255,.07);
  --pillactive:rgba(255,255,255,.09);
}

/* ═══════════ BASE ═══════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;overflow-x:hidden;height:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;transition:background .35s,color .35s}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ═══════════ AMBIENT ═══════════ */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.14;animation:drift 14s ease-in-out infinite alternate}
.orb.a{width:600px;height:600px;background:radial-gradient(var(--accent),transparent);top:-150px;left:-150px}
.orb.b{width:450px;height:450px;background:radial-gradient(var(--gold),transparent);bottom:-100px;right:-100px;animation-delay:-5s}
.orb.c{width:320px;height:320px;background:radial-gradient(#6366f1,transparent);top:45%;left:45%;opacity:.08;animation-delay:-9s}
@keyframes drift{to{transform:translate(40px,25px) scale(1.1)}}

/* ═══════════ HEADER ═══════════ */
header{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:58px;padding:0 1.5rem;
  display:flex;align-items:center;gap:1rem;
  background:var(--glass);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid var(--glassborder);
  transition:background .35s;
}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;user-select:none;flex-shrink:0;
}

/* search */
.search-wrap{position:relative;flex:1;max-width:460px}
.search-wrap input{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid var(--border);border-radius:999px;
  padding:.48rem 1rem .48rem 2.5rem;
  color:var(--text);font-size:.84rem;font-family:inherit;outline:none;transition:all .22s;
}
[data-theme="light"] .search-wrap input{background:rgba(0,0,0,.05)}
.search-wrap input:focus{background:rgba(255,255,255,.1);border-color:rgba(230,57,70,.45);box-shadow:0 0 0 3px var(--accentglow)}
.search-wrap input::placeholder{color:var(--muted)}
.si{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.sr-dropdown{
  position:absolute;top:calc(100% + 10px);left:0;right:0;
  background:var(--glass);backdrop-filter:blur(36px) saturate(160%);
  -webkit-backdrop-filter:blur(36px) saturate(160%);
  border:1px solid var(--glassborder);border-radius:16px;
  overflow:hidden;max-height:380px;overflow-y:auto;z-index:999;
  box-shadow:var(--shadow);
  opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;
  transition:all .2s cubic-bezier(.34,1.5,.64,1);
}
.sr-dropdown.open{opacity:1;transform:none;pointer-events:all}
.sr-item{display:flex;align-items:center;gap:.7rem;padding:.55rem .9rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(255,255,255,.06)}
.sr-img{width:34px;height:50px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg3)}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:.68rem;color:var(--text2);margin-top:2px}
.sr-badge{font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:700;flex-shrink:0}
.sr-badge.movie{background:rgba(230,57,70,.18);color:var(--accent)}
.sr-badge.tv{background:rgba(244,162,97,.15);color:var(--gold)}

/* desktop tabs */
nav.tabs{display:flex;gap:.15rem}
.tab-btn{background:none;border:none;color:var(--text2);font-family:inherit;font-size:.8rem;font-weight:500;padding:.38rem .75rem;border-radius:8px;cursor:pointer;transition:all .18s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.07)}
.tab-btn.active{color:var(--accent);background:rgba(230,57,70,.1)}
.hdr-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.icon-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;color:var(--text2);transition:all .18s;flex-shrink:0}
.icon-btn:hover{color:var(--text);background:rgba(255,255,255,.12);border-color:var(--border2)}

/* ═══════════ LIQUID PILL NAV ═══════════ */
.pill-nav{
  display:none;
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:var(--pillbg);
  backdrop-filter:blur(44px) saturate(220%) brightness(1.08);
  -webkit-backdrop-filter:blur(44px) saturate(220%) brightness(1.08);
  border:1px solid var(--pillborder);
  border-radius:999px;
  padding:5px 6px;
  gap:2px;
  box-shadow:
    0 12px 40px rgba(0,0,0,.45),
    0 1px 0 rgba(255,255,255,.08) inset,
    0 -1px 0 rgba(0,0,0,.25) inset;
  width:auto;
  max-width:calc(100vw - 32px);
  /* Always fixed, never in flow */
  align-items:center;
}
[data-theme="light"] .pill-nav{
  background:rgba(255,255,255,.62);
  box-shadow:0 12px 40px rgba(0,0,0,.14),0 1px 0 rgba(255,255,255,.9) inset,0 0 0 1px rgba(0,0,0,.06);
}
.pnav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:none;border:none;
  color:var(--text2);font-family:inherit;font-size:.56rem;font-weight:600;
  cursor:pointer;
  padding:7px 14px;
  border-radius:999px;
  transition:all .22s cubic-bezier(.34,1.45,.64,1);
  min-width:56px;
  position:relative;letter-spacing:.25px;
  -webkit-tap-highlight-color:transparent;
}
.pnav-icon{font-size:1.15rem;line-height:1;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.pnav-btn:hover .pnav-icon{transform:scale(1.12) translateY(-1px)}
.pnav-btn.active{
  color:var(--text);
  background:var(--pillactive);
  box-shadow:0 2px 10px rgba(0,0,0,.2),0 1px 0 rgba(255,255,255,.1) inset;
}
.pnav-btn.active .pnav-icon{transform:scale(1.08) translateY(-1px)}
.pnav-btn.active::after{
  content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px var(--accentglow);
}

/* ═══════════ HERO ═══════════ */
#hero{position:relative;height:78vh;min-height:480px;margin-top:58px;overflow:hidden;cursor:pointer}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 22%;transition:opacity .8s ease;opacity:0}
.hero-grain{position:absolute;inset:0;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(7,9,15,.96) 0%,rgba(7,9,15,.45) 48%,transparent 72%),linear-gradient(to top,var(--bg) 0%,transparent 52%)}
[data-theme="light"] .hero-grad{background:linear-gradient(to right,rgba(243,245,249,.97) 0%,rgba(243,245,249,.48) 48%,transparent 72%),linear-gradient(to top,var(--bg) 0%,transparent 52%)}
.hero-content{position:absolute;bottom:0;left:0;padding:2rem 2rem 3.5rem;max-width:560px;z-index:2}
.hero-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.64rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);background:rgba(230,57,70,.1);padding:3px 10px;border-radius:5px;border:1px solid rgba(230,57,70,.2);margin-bottom:.55rem}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5.5vw,4.2rem);line-height:.95;letter-spacing:2px;margin-bottom:.65rem;text-shadow:0 2px 28px rgba(0,0,0,.35)}
.hero-meta{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-bottom:.6rem}
.htmdb{color:#01d277;font-weight:600;font-size:.8rem}
.himdb{background:#f5c518;color:#000;font-weight:700;font-size:.68rem;padding:2px 6px;border-radius:3px}
.hspoken{font-size:.72rem;color:var(--text2);background:rgba(255,255,255,.08);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}
.hdot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0}
.hyear,.hruntime{color:var(--text2);font-size:.78rem}
.hero-genres{display:flex;gap:.32rem;flex-wrap:wrap;margin-bottom:.72rem}
.hgenre{font-size:.66rem;padding:2px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.11);color:var(--text2)}
.hero-desc{color:rgba(238,240,246,.62);font-size:.84rem;line-height:1.65;max-width:450px;margin-bottom:1.2rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
[data-theme="light"] .hero-desc{color:rgba(15,23,42,.58)}
.hero-acts{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.btn-watch{display:inline-flex;align-items:center;gap:.42rem;background:var(--accent);color:#fff;font-family:inherit;font-size:.84rem;font-weight:600;padding:.58rem 1.4rem;border-radius:999px;border:none;cursor:pointer;transition:all .22s cubic-bezier(.34,1.4,.64,1);box-shadow:0 4px 20px var(--accentglow),0 1px 0 rgba(255,255,255,.2) inset}
.btn-watch:hover{transform:scale(1.04) translateY(-1px);box-shadow:0 8px 28px var(--accentglow)}
.btn-watch:active{transform:scale(.97)}
.btn-ghost{display:inline-flex;align-items:center;gap:.38rem;background:rgba(255,255,255,.1);color:var(--text);font-family:inherit;font-size:.84rem;font-weight:500;padding:.58rem 1.15rem;border-radius:999px;border:1px solid rgba(255,255,255,.14);cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
.btn-ghost:hover{background:rgba(255,255,255,.17);transform:translateY(-1px)}
.btn-fav{display:inline-flex;align-items:center;gap:.32rem;background:transparent;color:var(--text2);font-family:inherit;font-size:.84rem;padding:.58rem .9rem;border-radius:999px;border:1px solid var(--border2);cursor:pointer;transition:all .2s}
.btn-fav.saved{color:var(--gold);border-color:rgba(244,162,97,.38);background:rgba(244,162,97,.07)}
.hero-dots{position:absolute;bottom:1.4rem;right:1.8rem;display:flex;gap:.4rem;z-index:2}
.hdot2{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:all .3s cubic-bezier(.34,1.4,.64,1)}
.hdot2.active{background:var(--accent);width:20px;border-radius:3px;box-shadow:0 0 8px var(--accentglow)}

/* ═══════════ MAIN ═══════════ */
main{padding:0 1.5rem 5rem;position:relative;z-index:1}

/* section */
.shd{display:flex;align-items:center;justify-content:space-between;margin:2.3rem 0 1rem}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:1.5px}

/* card row */
.crow{display:flex;gap:.8rem;overflow-x:auto;padding-bottom:.7rem;scroll-snap-type:x mandatory;-ms-overflow-style:none;scrollbar-width:none}
.crow::-webkit-scrollbar{display:none}

/* ═══════════ CARD ═══════════ */
.card{flex-shrink:0;width:140px;cursor:pointer;scroll-snap-align:start;transition:transform .24s cubic-bezier(.34,1.4,.64,1)}
.card:hover{transform:translateY(-6px) scale(1.02)}
.card:active{transform:scale(.96)}
.cpos{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:2/3;background:var(--bg3)}
.cpos img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .32s}
.card:hover .cpos img{transform:scale(1.06)}
.cshine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 50%);opacity:0;transition:opacity .2s}
.card:hover .cshine{opacity:1}
.cover{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 55%);opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.card:hover .cover{opacity:1}
.cplay{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.88rem;color:#fff;margin-bottom:2rem;box-shadow:0 4px 18px var(--accentglow);transform:scale(.8);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.card:hover .cplay{transform:scale(1)}
.cfav{position:absolute;top:.4rem;left:.4rem;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:none;border-radius:50%;width:26px;height:26px;font-size:.64rem;cursor:pointer;color:var(--text2);display:none;align-items:center;justify-content:center;transition:all .18s;z-index:2}
.card:hover .cfav,.cfav.saved{display:flex}
.cfav.saved{color:var(--gold)}
.crat{position:absolute;top:.4rem;right:.4rem;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border-radius:5px;padding:2px 5px;font-size:.63rem;font-weight:600;display:flex;align-items:center;gap:2px}
.rt{color:#01d277}.ri{color:#f5c518}
.ctag{position:absolute;bottom:.4rem;left:.4rem;font-size:.57rem;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.4px}
.ctag.tv{background:var(--gold);color:#000}
.ctag.movie{background:var(--accent);color:#fff}
.cinfo{margin-top:.42rem}
.ctitle{font-size:.76rem;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cyear{font-size:.67rem;color:var(--text2);margin-top:1px}

/* wide card */
.wcard{flex-shrink:0;width:255px;cursor:pointer;border-radius:var(--r);overflow:hidden;aspect-ratio:16/9;scroll-snap-align:start;position:relative;transition:transform .24s cubic-bezier(.34,1.4,.64,1)}
.wcard:hover{transform:translateY(-4px) scale(1.01)}
.wcard img{width:100%;height:100%;object-fit:cover;transition:transform .32s}
.wcard:hover img{transform:scale(1.04)}
.wgrad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:.65rem}
.wtitle{font-weight:600;font-size:.78rem}
.wmeta{font-size:.67rem;color:var(--text2);margin-top:2px}

/* grid */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.8rem}

/* ═══════════ FILTERS ═══════════ */
.fbar{display:flex;gap:.65rem;align-items:flex-end;flex-wrap:wrap;margin:1rem 0;padding:.9rem 1.1rem;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1px solid var(--glassborder)}
.fgrp{display:flex;flex-direction:column;gap:.26rem;flex:1;min-width:110px}
.flbl{font-size:.63rem;color:var(--text2);font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.fsel{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.78rem;padding:.36rem .68rem;border-radius:8px;cursor:pointer;outline:none;transition:border .2s}
[data-theme="light"] .fsel{background:rgba(0,0,0,.05)}
.fsel:focus{border-color:rgba(230,57,70,.4)}
.frange{display:flex;align-items:center;gap:.4rem}
.frange input{flex:1;accent-color:var(--accent);height:4px}
.frange span{color:var(--accent);font-weight:700;min-width:26px;text-align:center;font-size:.78rem}
.fapply{background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:.76rem;font-weight:600;padding:.4rem 1rem;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;align-self:flex-end;box-shadow:0 3px 12px var(--accentglow)}
.fapply:hover{transform:translateY(-1px);box-shadow:0 5px 16px var(--accentglow)}

/* genre pills */
.grow{display:flex;gap:.38rem;overflow-x:auto;padding-bottom:.4rem;margin-bottom:.75rem;scrollbar-width:none}
.grow::-webkit-scrollbar{display:none}
.gp{flex-shrink:0;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);font-family:inherit;font-size:.72rem;padding:.33rem .85rem;border-radius:999px;cursor:pointer;transition:all .18s;font-weight:500}
.gp:hover{color:var(--text);background:rgba(255,255,255,.1)}
.gp.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px var(--accentglow)}

/* ═══════════ MODAL ═══════════ */
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
#moverlay.open{display:flex}
.modal{background:var(--bg2);border-radius:20px;border:1px solid var(--glassborder);width:100%;max-width:880px;overflow:hidden;position:relative;margin:auto;box-shadow:var(--shadow);animation:mIn .28s cubic-bezier(.34,1.3,.64,1)}
@keyframes mIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
.mclose{position:absolute;top:.85rem;right:.85rem;z-index:10;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:.85rem;transition:all .2s}
.mclose:hover{background:var(--accent);border-color:var(--accent);transform:scale(1.08)}
.mbg{position:relative;width:100%;height:255px;overflow:hidden}
.mbg img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.mbggrad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg2) 0%,transparent 58%),linear-gradient(to right,var(--bg2) 0%,transparent 42%)}
.mbody{padding:0 1.4rem 1.4rem;margin-top:-65px;position:relative}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:2.1rem;letter-spacing:2px;line-height:1}
.mmeta{display:flex;gap:.55rem;align-items:center;margin:.42rem 0 .82rem;flex-wrap:wrap}
.mtmdb{color:#01d277;font-weight:600;font-size:.82rem}
.mimdb{background:#f5c518;color:#000;font-weight:700;font-size:.68rem;padding:2px 6px;border-radius:4px}
.mlang-badges{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.5rem}
.mlang-badge{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600;background:rgba(255,255,255,.08);color:var(--text2);border:1px solid var(--border)}
.mlang-badge.hi{background:rgba(244,162,97,.12);color:var(--gold);border-color:rgba(244,162,97,.25)}
.mlang-badge.en{background:rgba(1,210,119,.1);color:#01d277;border-color:rgba(1,210,119,.22)}
.myear,.mruntime,.mlang{color:var(--text2);font-size:.78rem}
.mdot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0}
.mgenres{display:flex;gap:.32rem;flex-wrap:wrap;margin-bottom:.8rem}
.mgtag{font-size:.68rem;padding:2px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text2)}
.mdesc{color:rgba(238,240,246,.73);font-size:.84rem;line-height:1.65;margin-bottom:1.1rem}
[data-theme="light"] .mdesc{color:rgba(15,23,42,.7)}
.macts{display:flex;gap:.42rem;margin-bottom:1.1rem;flex-wrap:wrap}
.mbtn{display:inline-flex;align-items:center;gap:.36rem;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.78rem;padding:.46rem 1rem;border-radius:999px;cursor:pointer;transition:all .18s}
.mbtn:hover{background:rgba(255,255,255,.13);transform:translateY(-1px)}
.mbtn.saved{color:var(--gold);border-color:rgba(244,162,97,.32);background:rgba(244,162,97,.07)}

/* cast */
.castlbl{font-size:.66rem;font-weight:600;color:var(--text2);letter-spacing:.7px;text-transform:uppercase;margin-bottom:.58rem}
.castrow{display:flex;gap:.6rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.3rem}
.castrow::-webkit-scrollbar{display:none}
.castcard{flex-shrink:0;width:66px;cursor:pointer;text-align:center;transition:transform .2s}
.castcard:hover{transform:translateY(-2px)}
.castcard img{width:66px;height:66px;object-fit:cover;border-radius:50%;border:2px solid var(--border);background:var(--bg3);transition:border-color .18s}
.castcard:hover img{border-color:var(--accent)}
.cname{font-size:.62rem;margin-top:.32rem;line-height:1.3;font-weight:500}
.cchar{font-size:.58rem;color:var(--text2)}

/* ═══════════ PLAYER SECTION ═══════════ */
.psec{background:rgba(0,0,0,.38);border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-top:.2rem}
.phead{padding:.6rem .9rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.38rem}
.plbl{font-size:.67rem;font-weight:700;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}

/* source buttons with language tags */
.srcwrap{display:flex;gap:.28rem;flex-wrap:wrap;align-items:center}
.srcbtn{
  display:inline-flex;align-items:center;gap:.3rem;
  background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--text2);font-family:inherit;font-size:.67rem;
  padding:.26rem .6rem;border-radius:7px;cursor:pointer;transition:all .18s;font-weight:500;
  position:relative;
}
.srcbtn:hover{color:var(--text);background:rgba(255,255,255,.12)}
.srcbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accentglow)}
.srcbtn .ql{font-size:.56rem;background:rgba(255,255,255,.18);padding:1px 4px;border-radius:3px}
.srcbtn.active .ql{background:rgba(255,255,255,.25)}
.src-langs{display:flex;gap:2px;margin-left:1px}
.src-lang-dot{font-size:.55rem;background:rgba(255,255,255,.15);padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:.2px}
.src-lang-dot.hi{background:rgba(244,162,97,.3);color:#f4a261}
.src-lang-dot.en{background:rgba(1,210,119,.2);color:#01d277}
.src-lang-dot.active-src{background:rgba(255,255,255,.25);color:#fff}
.srcbtn.active .src-lang-dot{background:rgba(255,255,255,.25);color:#fff}

/* open externally btn */
.ext-btn{display:inline-flex;align-items:center;gap:.28rem;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2);font-family:inherit;font-size:.64rem;padding:.24rem .55rem;border-radius:6px;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.ext-btn:hover{color:var(--text);background:rgba(255,255,255,.1);border-color:var(--border2)}
#adShieldBadge{font-weight:600;letter-spacing:.2px;transition:all .2s}
#adShieldBadge:hover{transform:scale(1.04)}

.pwrap{position:relative}
.pframe{width:100%;aspect-ratio:16/9;border:none;display:block;background:#000}
.ploading{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,rgba(230,57,70,.05),#000 70%);flex-direction:column;gap:.75rem;color:var(--text2);font-size:.82rem}
.spin{width:34px;height:34px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* language info banner */
.lang-banner{padding:.45rem .9rem;border-bottom:1px solid var(--border);background:rgba(244,162,97,.04);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;font-size:.7rem;color:var(--text2)}
.lang-banner-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;box-shadow:0 0 5px var(--goldglow)}
.lang-spoken-chips{display:flex;gap:.28rem;flex-wrap:wrap}
.lchip{font-size:.64rem;padding:1px 7px;border-radius:4px;font-weight:600;background:rgba(255,255,255,.07);color:var(--text2);border:1px solid var(--border)}
.lchip.hi{background:rgba(244,162,97,.12);color:var(--gold);border-color:rgba(244,162,97,.22)}

/* episode selector */
.epsel{padding:.68rem .9rem;border-top:1px solid var(--border)}
.eptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:.48rem;flex-wrap:wrap;gap:.35rem}
.eplbl{font-size:.66rem;font-weight:600;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}
.aplbl{display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--text2);cursor:pointer;user-select:none}
.aplbl input{accent-color:var(--accent)}
.ssel{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.76rem;padding:.3rem .64rem;border-radius:7px;cursor:pointer;outline:none;margin-bottom:.48rem}
.epgrid{display:flex;gap:.28rem;flex-wrap:wrap;max-height:108px;overflow-y:auto}
.epbtn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text2);font-size:.68rem;padding:.26rem .48rem;border-radius:5px;cursor:pointer;transition:all .14s;font-family:inherit;min-width:33px;text-align:center;position:relative}
.epbtn:hover{color:var(--text);background:rgba(255,255,255,.1)}
.epbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.epbtn.watched::after{content:'';position:absolute;bottom:2px;right:2px;width:4px;height:4px;border-radius:50%;background:var(--gold)}

/* subtitle row */
.subrow{padding:.55rem .9rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.sublbl{font-size:.66rem;font-weight:600;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}
.subsel{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.73rem;padding:.26rem .6rem;border-radius:6px;cursor:pointer;outline:none}
.subnote{font-size:.65rem;color:var(--muted);font-style:italic}

/* ═══════════ TRAILER ═══════════ */
#toverlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:3000;display:none;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#toverlay.open{display:flex}
.tinner{width:100%;max-width:860px;position:relative}
.tclose{position:absolute;top:-44px;right:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:999px;color:#fff;font-size:.84rem;cursor:pointer;padding:.32rem .85rem;transition:all .2s;font-family:inherit}
.tclose:hover{background:var(--accent)}
.tframe{width:100%;aspect-ratio:16/9;border:none;border-radius:14px}

/* cw row */
.cwitem{flex-shrink:0;width:185px;cursor:pointer;border-radius:var(--r);overflow:hidden;position:relative;scroll-snap-align:start;transition:transform .24s cubic-bezier(.34,1.4,.64,1)}
.cwitem:hover{transform:translateY(-4px) scale(1.01)}
.cwitem img{width:100%;aspect-ratio:16/9;object-fit:cover}
.cwov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 52%);padding:.5rem}
.cwtitle{position:absolute;bottom:.5rem;left:.5rem;right:1.8rem;font-size:.72rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cwpb{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.12)}
.cwpf{height:100%;background:linear-gradient(to right,var(--accent),var(--gold))}
.cwdel{position:absolute;top:.35rem;right:.35rem;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border:none;border-radius:50%;width:22px;height:22px;font-size:.6rem;cursor:pointer;color:var(--text2);display:none;align-items:center;justify-content:center}
.cwitem:hover .cwdel{display:flex}

/* person */
.pbody{padding:1.4rem}
.phead2{display:flex;gap:1rem;margin-bottom:1.1rem}
.pimg{width:86px;height:86px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0}
.pname{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:1.5px}
.psub{font-size:.77rem;color:var(--text2);margin-top:.2rem}
.pbio{font-size:.82rem;color:rgba(238,240,246,.7);line-height:1.65;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}

/* watchlist */
.wlempty{text-align:center;padding:4rem 1rem;color:var(--text2)}
.wlicon{font-size:2.5rem;margin-bottom:.7rem;opacity:.45}

/* theme menu */
.tmenu{position:absolute;top:calc(100% + 8px);right:0;background:var(--glass);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--glassborder);border-radius:12px;overflow:hidden;z-index:999;box-shadow:var(--shadow);min-width:145px;opacity:0;transform:translateY(-6px) scale(.96);pointer-events:none;transition:all .18s cubic-bezier(.34,1.4,.64,1)}
.tmenu.open{opacity:1;transform:none;pointer-events:all}
.topt{display:flex;align-items:center;gap:.58rem;padding:.58rem .9rem;cursor:pointer;font-size:.78rem;transition:background .14s}
.topt:hover{background:rgba(255,255,255,.07)}
.topt.active{color:var(--accent)}
.tdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* toast */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glassborder);border-radius:999px;padding:.52rem 1.3rem;font-size:.78rem;z-index:9999;opacity:0;transition:all .26s cubic-bezier(.34,1.4,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.32)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skcard{width:140px;flex-shrink:0}
.skpost{aspect-ratio:2/3;border-radius:var(--r)}
.skline{height:.62rem;border-radius:4px;margin-top:.42rem}

/* page anim */
.pfade{animation:pfade .28s ease}
@keyframes pfade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ═══════════ RESPONSIVE -- TABLET ═══════════ */
@media(min-width:681px) and (max-width:1024px){
  .pill-nav{display:none!important}
  nav.tabs{display:flex}
  main{padding:0 1.5rem 3rem}
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .card{width:145px}
  #hero{height:65vh}
  .hero-content{max-width:60%}
  .modal{max-width:700px}
}

/* ═══════════ RESPONSIVE -- DESKTOP ═══════════ */
@media(min-width:1025px){
  .pill-nav{display:none!important}
  nav.tabs{display:flex}
  header{padding:0 2.5rem}
  main{padding:0 2.5rem 3rem;max-width:1400px;margin:0 auto}
  #hero{height:72vh}
  .hero-content{max-width:520px;padding:2.5rem 2.5rem 4rem}
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
  .card{width:150px}
  .wcard{width:280px}
  .modal{max-width:900px}
  .mbg{height:300px}
}

/* ═══════════ RESPONSIVE -- MOBILE ═══════════ */
@media(max-width:680px){
  header{padding:0 .9rem;gap:.6rem;height:54px}
  .logo{font-size:1.38rem}
  nav.tabs{display:none}
  .pill-nav{display:flex!important}
  main{padding:0 .9rem 6rem}
  main.page-tab{padding-top:0}
  #hero{margin-top:54px;height:66vh;min-height:380px}
  .hero-content{padding:1.3rem .9rem 3rem;max-width:100%}
  .hero-title{font-size:1.85rem}
  .hero-desc{-webkit-line-clamp:2;font-size:.8rem}
  .hero-acts .btn-ghost{display:none}
  .card{width:118px}
  .skcard{width:118px}
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(108px,1fr))}
  .mbg{height:185px}
  .mtitle{font-size:1.65rem}
  .mbody{padding:0 1rem 1rem}
  .cwitem{width:158px}
  #toast{bottom:92px}
  .fbar{gap:.5rem}
  .wcard{width:220px}
}
</style>

<body>

<div class="ambient"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>

<header>
  <div class="logo" onclick="switchTab('home')">SV</div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies & shows…" autocomplete="off" spellcheck="false"/>
    <div class="sr-dropdown" id="srDrop"></div>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('home',this)">Home</button>
    <button class="tab-btn" onclick="switchTab('movies',this)">Movies</button>

    <button class="icon-btn" onclick="doLogout()" title="Logout" style="font-size:.75rem;color:var(--text2)">⎋ Exit</button>

      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🎨</button>
      <div class="tmenu" id="tmenu">

        <div class="topt" onclick="setTheme('light',this)"><div class="tdot" style="background:#f3f5f9;border:1px solid #ccc"></div>Light</div>
        <div class="topt" onclick="setTheme('amoled',this)"><div class="tdot" style="background:#000;border:1px solid #222"></div>AMOLED</div>
      </div>
    </div>
  </div>
</header>

<nav class="pill-nav" id="pillNav">
  <button class="pnav-btn active" onclick="switchTab('home',this)" data-tab="home"><span class="pnav-icon">🏠</span>Home</button>
  <button class="pnav-btn" onclick="switchTab('movies',this)" data-tab="movies"><span class="pnav-icon">🎬</span>Movies</button>
  <button class="pnav-btn" onclick="switchTab('tv',this)" data-tab="tv"><span class="pnav-icon">📺</span>TV</button>
  <button class="pnav-btn" onclick="switchTab('trending',this)" data-tab="trending"><span class="pnav-icon">🔥</span>Hot</button>
  <button class="pnav-btn" onclick="switchTab('watchlist',this)" data-tab="watchlist"><span class="pnav-icon">⭐</span>Saved</button>
</nav>

<main id="mc"></main>

</div>

<script>
// ════════════════════════════════════
// CONFIG — Keys are hidden server-side
// All TMDB calls go through /api/tmdb
// ════════════════════════════════════
const IMG = "https://image.tmdb.org/t/p/";

// ════════════════════════════════════
// SOURCES -- no sandbox, language tags shown
// ════════════════════════════════════
const LANG_MAP = {en:'EN',hi:'HI',ko:'KO',ja:'JA',es:'ES',fr:'FR',zh:'ZH',de:'DE',ar:'AR',ta:'TA',te:'TE',ml:'ML'};

const SOURCES = [
  {
    id:'vidlink', label:'VidLink', ql:'HD',
    langs:['en','hi','ko','ja','es','fr'],  // supports multi-language/subs
    fn:(id,t,s,e,lang)=>{
      const base = t==='tv'?`https://vidlink.pro/tv/${id}/${s}/${e}`:`https://vidlink.pro/movie/${id}`;
      return base+`?autoplay=true&primaryColor=e63946${lang?'&sub_lang='+lang:''}`;
    }
  },
  {
    id:'vidsrc', label:'VidSrc', ql:'HD',
    langs:['en'],
    fn:(id,t,s,e)=>t==='tv'?`https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${s}&episode=${e}`:`https://vidsrc.xyz/embed/movie?tmdb=${id}`
  },
  {
    id:'autoembed', label:'AutoEmbed', ql:'HD',
    langs:['en','hi'],  // has Bollywood dual audio Hindi content
    fn:(id,t,s,e)=>t==='tv'?`https://player.autoembed.cc/embed/tv/${id}/${s}/${e}`:`https://player.autoembed.cc/embed/movie/${id}`
  },
  {
    id:'embedsu', label:'Embed.su', ql:'4K',
    langs:['en','hi','ko','ja'],
    fn:(id,t,s,e)=>t==='tv'?`https://embed.su/embed/tv/${id}/${s}/${e}`:`https://embed.su/embed/movie/${id}`
  },
  {
    id:'letsembed', label:'LetsEmbed', ql:'HD',
    langs:['en','hi','ko','es','fr','de','ja','zh','ar','pt'],  // 50+ subtitle languages
    fn:(id,t,s,e)=>t==='tv'?`https://letsembed.cc/embed/tv/?id=${id}/${s}/${e}`:`https://letsembed.cc/embed/movie/?id=${id}`
  },
  {
    id:'videasy', label:'Videasy', ql:'4K',
    langs:['en','hi','ko','ja','es'],
    fn:(id,t,s,e)=>t==='tv'?`https://player.videasy.net/tv/${id}/${s}/${e}`:`https://player.videasy.net/movie/${id}`
  },
  {
    id:'multiemb', label:'MultiEmbed', ql:'4K',
    langs:['en'],
    fn:(id,t,s,e)=>t==='tv'?`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`:`https://multiembed.mov/?video_id=${id}&tmdb=1`
  },
  {
    id:'embed2', label:'2Embed', ql:'HD',
    langs:['en'],
    fn:(id,t,s,e)=>t==='tv'?`https://www.2embed.stream/embed/tv/${id}/${s}/${e}`:`https://www.2embed.stream/embed/movie/${id}`
  },
  {
    id:'vidsrccc', label:'VidSrc.cc', ql:'HD',
    langs:['en','hi','ko','ja'],
    fn:(id,t,s,e)=>t==='tv'?`https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`:`https://vidsrc.cc/v2/embed/movie/${id}`
  },
  {
    id:'vidsrcnl', label:'VidSrc.nl', ql:'HD',
    langs:['en'],
    fn:(id,t,s,e)=>t==='tv'?`https://vidsrc.nl/embed/tv/${id}/${s}/${e}`:`https://vidsrc.nl/embed/movie/${id}`
  },
];

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let heroItems=[],heroIdx=0,heroTimer=null;
let currentTab='home';
let history2  = JSON.parse(localStorage.getItem('sv_history') ||'[]');
let watchlist  = JSON.parse(localStorage.getItem('sv_watchlist')||'[]');
let progress   = JSON.parse(localStorage.getItem('sv_progress') ||'{}');
let genres={movie:{},tv:{}};
let activeGenre=0,fYear='',fRating=0,fLang='';

let imdbCache={},apiCache={};
let curSubLang='';

// ════════════════════════════════════
// API
// ════════════════════════════════════
async function api(path,params=''){
  const key=path+params;
  if(apiCache[key]) return apiCache[key];
  // All requests go through our secure Vercel proxy — keys never exposed
  const url=`/api/tmdb?path=${encodeURIComponent(path)}${params?'&params='+encodeURIComponent(params.replace(/^&/,'')):''}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error(`API error ${r.status}`);
  const d=await r.json();
  apiCache[key]=d;
  return d;
}

async function loadGenres(){
  const[mg,tg]=await Promise.all([api('/genre/movie/list'),api('/genre/tv/list')]);
  mg.genres.forEach(g=>genres.movie[g.id]=g.name);
  tg.genres.forEach(g=>genres.tv[g.id]=g.name);
}
function gnames(ids,type){return(ids||[]).slice(0,3).map(id=>genres[type][id]).filter(Boolean)}

// Get spoken languages from TMDB details
function getSpokenLangs(details){
  const langs=(details.spoken_languages||[]).map(l=>l.iso_639_1).filter(Boolean);
  // Also include original_language
  if(details.original_language&&!langs.includes(details.original_language)) langs.unshift(details.original_language);
  return [...new Set(langs)];
}

// Language display name
const LANG_NAMES={en:'English',hi:'Hindi',ko:'Korean',ja:'Japanese',es:'Spanish',fr:'French',zh:'Chinese',de:'German',ar:'Arabic',ta:'Tamil',te:'Telugu',ml:'Malayalam',pt:'Portuguese',tr:'Turkish',it:'Italian',ru:'Russian',pl:'Polish',nl:'Dutch'};
function langName(code){return LANG_NAMES[code]||code.toUpperCase()}

// ════════════════════════════════════
// IMDB
// ════════════════════════════════════
async function getImdb(id,type){
  if(imdbCache[id]!==undefined) return imdbCache[id];
  try{
    const d=await api(`/${type}/${id}/external_ids`);
    if(!d.imdb_id){imdbCache[id]=null;return null;}
    const r=await fetch(`https://www.omdbapi.com/?i=${d.imdb_id}&apikey=trilogy`);
    const j=await r.json();
    const v=j.imdbRating&&j.imdbRating!=='N/A'?j.imdbRating:null;
    imdbCache[id]=v;return v;
  }catch(e){imdbCache[id]=null;return null;}
}

async function loadHero(){
  const d=await api('/trending/all/day');
  heroItems=d.results.filter(i=>i.backdrop_path).slice(0,6);
  buildDots();showHero(0);
  heroTimer=setInterval(()=>{heroIdx=(heroIdx+1)%heroItems.length;showHero(heroIdx);},7500);
}

async function showHero(idx){
  heroIdx=idx;
  const i=heroItems[idx];
  const type=i.media_type==='tv'?'tv':'movie';
  const title=i.title||i.name||'';
  const year=(i.release_date||i.first_air_date||'').slice(0,4);
  const bg=document.getElementById('heroBg');
  bg.style.opacity='0';
  setTimeout(()=>{
    bg.style.backgroundImage=`url(${IMG}original${i.backdrop_path})`;
    const img=new Image();img.onload=()=>bg.style.opacity='1';img.src=`${IMG}original${i.backdrop_path}`;
  },180);
  document.getElementById('heroBadge').textContent=type==='tv'?'📺 SERIES':'🎬 MOVIE';
  document.getElementById('heroTitle').textContent=title;
  document.getElementById('heroDesc').textContent=i.overview||'';
  const gs=gnames(i.genre_ids,type);
  document.getElementById('heroGenres').innerHTML=gs.map(g=>`<span class="hgenre">${g}</span>`).join('');
  document.getElementById('heroMeta').innerHTML=`
    <span class="htmdb">TMDB ★${i.vote_average?.toFixed(1)||'?'}</span>
    <span class="hdot"></span><span class="hyear">${year}</span>
    <span class="himdb" id="hImdb">IMDb --</span>
  `;
  const inWL=isInWL(i.id);
  const fb=document.getElementById('heroFav');
  fb.className='btn-fav'+(inWL?' saved':'');fb.textContent=inWL?'★ Saved':'☆ Save';
  fb.onclick=()=>toggleWL({id:i.id,type,title,poster:i.poster_path,year});
  document.getElementById('heroPlay').onclick=()=>openModal(i.id,type,title);
  document.getElementById('heroTrailer').onclick=()=>openTrailer(i.id,type);
  document.querySelectorAll('.hdot2').forEach((d,j)=>d.classList.toggle('active',j===idx));
  getImdb(i.id,type).then(r=>{const el=document.getElementById('hImdb');if(el)el.textContent=r?`IMDb ${r}`:'';});
}

function buildDots(){
  document.getElementById('heroDots').innerHTML=heroItems.map((_,i)=>
    `<div class="hdot2${i===0?' active':''}" onclick="showHero(${i})"></div>`).join('');
}

function switchTab(tab,el){
  if(currentTab===tab&&el)return;
  currentTab=tab;activeGenre=0;fYear='';fRating=0;fLang='';
  document.querySelectorAll('.tab-btn,.pnav-btn').forEach(b=>b.classList.remove('active'));
  if(el){el.classList.add('active');}
  // sync both navs
  document.querySelector(`.tab-btn:nth-child(${['home','movies','tv','trending','watchlist'].indexOf(tab)+1})`)?.classList.add('active');
  document.querySelector(`.pnav-btn[data-tab="${tab}"]`)?.classList.add('active');
  document.getElementById('hero').style.display=tab==='home'?'block':'none';
  window.scrollTo({top:0,behavior:'instant'});
  loadMC();
}

async function loadMC(){
  const mc=document.getElementById('mc');
  const isHome=currentTab==='home';
  // Non-home: hero hidden, need top spacing after fixed header
  mc.innerHTML=isHome?'<div style="height:.5rem"></div>':'<div class="page-spacer" style="height:72px"></div>';
  mc.classList.remove('pfade');void mc.offsetWidth;mc.classList.add('pfade');
  if(currentTab==='home')      return renderHome();
  if(currentTab==='movies')    return renderBrowse('movie');
  if(currentTab==='tv')        return renderBrowse('tv');
  if(currentTab==='trending')  return renderTrending();
  if(currentTab==='watchlist') return renderWatchlist();
}

async function renderHome(){
  const mc=document.getElementById('mc');mc.innerHTML='<div style="height:.3rem"></div>';
  if(history2.length){mc.insertAdjacentHTML('beforeend',shd('Continue Watching'));mc.appendChild(buildCwRow());}
  mc.insertAdjacentHTML('beforeend',shd('🔥 Trending'));const tr=skRow();mc.appendChild(tr);
  mc.insertAdjacentHTML('beforeend',shd('🎬 Popular Movies'));const mr=skRow();mc.appendChild(mr);
  mc.insertAdjacentHTML('beforeend',shd('📺 Popular TV'));const tvr=skRow();mc.appendChild(tvr);
  mc.insertAdjacentHTML('beforeend',shd('⭐ Top Rated'));const tor=skRow();mc.appendChild(tor);
  mc.insertAdjacentHTML('beforeend',shd('🎟 Coming Soon'));const cs=skRow(true);mc.appendChild(cs);
  const[t,pm,pt,tm,up]=await Promise.all([api('/trending/all/day'),api('/movie/popular'),api('/tv/popular'),api('/movie/top_rated'),api('/movie/upcoming')]);
  tr.replaceWith(buildCRow(t.results.slice(0,20),'all'));
  mr.replaceWith(buildCRow(pm.results.slice(0,20),'movie'));
  tvr.replaceWith(buildCRow(pt.results.slice(0,20),'tv'));
  tor.replaceWith(buildCRow(tm.results.slice(0,20),'movie'));
  cs.replaceWith(buildWRow(up.results.slice(0,12),'movie'));
}

async function renderBrowse(type){
  const mc=document.getElementById('mc');
  const _sp=mc.querySelector('.page-spacer');
  mc.innerHTML='';
  if(_sp) mc.appendChild(_sp);
  const langs=[{v:'',l:'All Languages'},{v:'en',l:'English'},{v:'hi',l:'Hindi'},{v:'ko',l:'Korean'},{v:'ja',l:'Japanese'},{v:'es',l:'Spanish'},{v:'fr',l:'French'},{v:'de',l:'German'},{v:'tr',l:'Turkish'},{v:'ta',l:'Tamil'},{v:'te',l:'Telugu'},{v:'ml',l:'Malayalam'},{v:'ar',l:'Arabic'},{v:'zh',l:'Chinese'}];
  const years=[{v:'',l:'All Years'},...Array.from({length:27},(_,i)=>({v:2025-i,l:String(2025-i)}))];
  const fb=document.createElement('div');fb.className='fbar';
  fb.innerHTML=`
    <div class="fgrp"><div class="flbl">Year</div>
      <select class="fsel" id="fyear">${years.map(y=>`<option value="${y.v}"${fYear==y.v?' selected':''}>${y.l}</option>`).join('')}</select></div>
    <div class="fgrp"><div class="flbl">Min Rating <span style="color:var(--accent);font-weight:700" id="frv">${fRating||'Any'}</span></div>
      <div class="frange"><input type="range" min="0" max="9" step="1" value="${fRating}" id="frating" oninput="document.getElementById('frv').textContent=+this.value||'Any'"/></div></div>
    <div class="fgrp"><div class="flbl">Language</div>
      <select class="fsel" id="flang">${langs.map(l=>`<option value="${l.v}"${fLang===l.v?' selected':''}>${l.l}</option>`).join('')}</select></div>
    <button class="fapply" onclick="applyF('${type}')">Apply ✓</button>`;
  mc.appendChild(fb);
  const gs=type==='movie'?genres.movie:genres.tv;
  const gl=[{id:0,name:'All'},...Object.entries(gs).map(([id,name])=>({id:+id,name}))];
  const gr=document.createElement('div');gr.className='grow';
  gl.forEach(g=>{
    const b=document.createElement('button');b.className='gp'+(g.id===activeGenre?' active':'');
    b.textContent=g.name;
    b.onclick=()=>{activeGenre=g.id;gr.querySelectorAll('.gp').forEach(x=>x.classList.remove('active'));b.classList.add('active');loadGrid(type,grid);};
    gr.appendChild(b);
  });
  mc.appendChild(gr);
  const grid=document.createElement('div');grid.className='mgrid';mc.appendChild(grid);
  await loadGrid(type,grid);
}

async function loadGrid(type,grid){
  grid.innerHTML=Array(20).fill(`<div class="skcard"><div class="skeleton skpost"></div><div class="skeleton skline" style="width:72%"></div></div>`).join('');
  let p=activeGenre?`&with_genres=${activeGenre}`:'';
  if(fYear) p+=`&primary_release_year=${fYear}&first_air_date_year=${fYear}`;
  if(fRating) p+=`&vote_average.gte=${fRating}`;
  if(fLang) p+=`&with_original_language=${fLang}`;
  const d=await api(`/discover/${type}`,`&sort_by=popularity.desc${p}`);
  grid.innerHTML='';
  d.results.forEach(item=>{
    if(!item.poster_path)return;
    const t=item.title||item.name||'',y=(item.release_date||item.first_air_date||'').slice(0,4);
    grid.appendChild(mkCard(item,type,t,y));
  });
}

function applyF(type){
  fYear=document.getElementById('fyear').value;
  fLang=document.getElementById('flang').value;
  fRating=+document.getElementById('frating').value;
  const grid=document.querySelector('.mgrid');if(grid)loadGrid(type,grid);
  showToast('✓ Filters applied');
}

async function renderTrending(){
  const mc=document.getElementById('mc');
  const _sp=mc.querySelector('.page-spacer');
  mc.innerHTML='';
  if(_sp) mc.appendChild(_sp);
  const tr=skRow(),wr=skRow();
  mc.insertAdjacentHTML('beforeend',shd('📈 Today'));mc.appendChild(tr);
  mc.insertAdjacentHTML('beforeend',shd('🗓 This Week'));mc.appendChild(wr);
  const[d,w]=await Promise.all([api('/trending/all/day'),api('/trending/all/week')]);
  tr.replaceWith(buildCRow(d.results.slice(0,20),'all'));
  wr.replaceWith(buildCRow(w.results.slice(0,20),'all'));
}

function renderWatchlist(){
  const mc=document.getElementById('mc');
  const _sp=mc.querySelector('.page-spacer');
  mc.innerHTML='';
  if(_sp) mc.appendChild(_sp);
  mc.insertAdjacentHTML('beforeend',shd('⭐ My Watchlist'));
  if(!watchlist.length){
    mc.insertAdjacentHTML('beforeend',`<div class="wlempty"><div class="wlicon">⭐</div><div>Watchlist is empty</div><div style="font-size:.77rem;margin-top:.35rem;color:var(--muted)">Tap ☆ on any title to save it</div></div>`);return;
  }
  const g=document.createElement('div');g.className='mgrid';
  watchlist.forEach(item=>{
    const el=document.createElement('div');el.className='card';
    el.innerHTML=`<div class="cpos"><img src="${IMG}w342${item.poster}" loading="lazy" onerror="this.src=''"/><div class="cover"><div class="cplay">▶</div></div><button class="cfav saved" onclick="event.stopPropagation();toggleWL(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(item))}')))">★</button><div class="ctag ${item.type}">${item.type==='tv'?'TV':'FILM'}</div></div><div class="cinfo"><div class="ctitle">${item.title}</div><div class="cyear">${item.year||''}</div></div>`;
    el.onclick=()=>openModal(item.id,item.type,item.title);
    g.appendChild(el);

}

function mkCard(item,type,t,y){
  const inWL=isInWL(item.id);
  const el=document.createElement('div');el.className='card';
  el.innerHTML=`<div class="cpos"><img src="${IMG}w342${item.poster_path}" loading="lazy"/><div class="cshine"></div><div class="cover"><div class="cplay">▶</div></div><button class="cfav${inWL?' saved':''}" onclick="event.stopPropagation();toggleWL(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify({id: item.id, type: type, title: t, poster: item.poster_path, year: y}))}')))">${inWL?'★':'☆'}</button><div class="crat"><span class="rt">★${item.vote_average?.toFixed(1)||'?'}</span></div><div class="ctag ${type}">${type==='tv'?'TV':'FILM'}</div></div><div class="cinfo"><div class="ctitle">${t}</div><div class="cyear">${y}</div></div>`;
  el.onclick=()=>openModal(item.id,type,t);
  return el;
}

function buildCRow(items,typeHint){
  const row=document.createElement('div');row.className='crow';
  items.forEach(item=>{
    if(!item.poster_path)return;
    const type=item.media_type||(typeHint==='all'?(item.first_air_date?'tv':'movie'):typeHint);
    const t=item.title||item.name||'',y=(item.release_date||item.first_air_date||'').slice(0,4);
    row.appendChild(mkCard(item,type,t,y));
  });
  return row;
}

function buildWRow(items,type){
  const row=document.createElement('div');row.className='crow';
  items.forEach(item=>{
    if(!item.backdrop_path)return;
    const t=item.title||item.name||'',y=(item.release_date||item.first_air_date||'').slice(0,4);
    const el=document.createElement('div');el.className='wcard';
    el.innerHTML=`<img src="${IMG}w780${item.backdrop_path}" loading="lazy"/><div class="wgrad"><div class="wtitle">${t}</div><div class="wmeta">${y} · ★${item.vote_average?.toFixed(1)||'?'}</div></div>`;
    el.onclick=()=>openModal(item.id,type,t);row.appendChild(el);
  });
  return row;
}

function buildCwRow(){
  const row=document.createElement('div');row.className='crow';
  history2.slice(0,12).forEach(h=>{
    const el=document.createElement('div');el.className='cwitem';
    const p=progress[h.id]?.pct||h.prog||25;
    el.innerHTML=`<img src="${IMG}w500${h.backdrop}" onerror="this.src=''"/><div class="cwov"><div class="cwtitle">${h.title}${h.type==='tv'&&h.lastEp?` · S${h.lastSeason||1}E${h.lastEp}`:''}</div><div class="cwpb"><div class="cwpf" style="width:${p}%"></div></div></div><button class="cwdel" onclick="event.stopPropagation();removeCw('${h.id}')">✕</button>`;
    el.onclick=()=>openModal(h.id,h.type,h.title);row.appendChild(el);
  });
  return row;
}

function skRow(wide=false){
  const row=document.createElement('div');row.className='crow';
  Array(8).fill(0).forEach(()=>{
    const d=document.createElement('div');
    if(wide){d.className='wcard skeleton';d.style.cssText='flex-shrink:0;width:255px;aspect-ratio:16/9;border-radius:12px';}
    else{d.className='skcard';d.innerHTML=`<div class="skeleton skpost"></div><div class="skeleton skline" style="width:68%"></div>`;}
    row.appendChild(d);
  });
  return row;
}

function shd(t){return`<div class="shd"><div class="stitle">${t}</div></div>`}

async function openModal(id,type,hint){
  const ov=document.getElementById('moverlay');

  document.getElementById('mcontent').innerHTML=`<div style="padding:4rem;text-align:center;color:var(--text2)"><div class="spin" style="margin:0 auto .8rem"></div>Loading…</div>`;
  failCnt=0;curSrcIdx=0;curSeason=1;curEp=1;curSubLang='';

  const[det,cred,vids]=await Promise.all([api(`/${type}/${id}`),api(`/${type}/${id}/credits`),api(`/${type}/${id}/videos`)]);
  curMedia={id,type,det,vids};

  const title=det.title||det.name||hint;
  const year=(det.release_date||det.first_air_date||'').slice(0,4);
  const runtime=type==='movie'&&det.runtime?`${det.runtime}m`:(det.episode_run_time?.[0]?`~${det.episode_run_time[0]}m/ep`:'');
  const gs=(det.genres||[]).map(g=>`<span class="mgtag">${g.name}</span>`).join('');
  const cast=(cred.cast||[]).slice(0,10);
  const inWL=isInWL(id);

  // Spoken languages from TMDB
  const spokenLangs=getSpokenLangs(det);

  // restore progress
  const sv=progress[id]||{};
  if(type==='tv'&&sv.season){curSeason=sv.season;curEp=sv.episode||1;}

  // cast html
  const castHtml=cast.length?`<div style="margin-bottom:1.1rem"><div class="castlbl">Cast</div><div class="castrow">${cast.map(c=>`<div class="castcard" onclick="openPerson(${c.id}, decodeURIComponent('${encodeURIComponent(c.name||'')}'))"><img src="${c.profile_path?IMG+'w185'+c.profile_path:''}" onerror="this.src=''"/><div class="cname">${c.name}</div><div class="cchar">${(c.character||'').slice(0,18)}</div></div>`).join('')}</div></div>`:'';

    return `<button class="srcbtn${i===0?' active':''}" onclick="switchSrc(${i},this)" title="${s.label} -- supports: ${s.langs.map(l=>langName(l)).join(', ')}">${s.label} <span class="ql">${s.ql}</span><div class="src-langs">${langDots}</div></button>`;

    <div class="mbg"><img src="${IMG}w1280${det.backdrop_path||det.poster_path}" onerror="this.style.display='none'"/><div class="mbggrad"></div></div>
    <div class="mbody">

        ${runtime?`<span class="mdot"></span><span class="mruntime">${runtime}</span>`:''}

            <div class="srcwrap" id="srcBtns">${srcBtns}</div>
            <a class="ext-btn" id="extBtn" target="_blank" rel="noopener noreferrer" title="Open in new tab if iframe is blocked">↗ Open</a>
            <button class="ext-btn" id="adShieldBadge" onclick="toggleAdShield();setTimeout(()=>{const b=document.getElementById('adShieldBadge');if(b){b.textContent=getAdShieldOn()?(window._adBlocked>0?'🛡 '+window._adBlocked+' blocked':'🛡 Shield ON'):'🛡 Shield OFF';b.style.color=getAdShieldOn()?'#22c55e':'var(--muted)'}},50)" style="cursor:pointer;color:#22c55e;border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.07)" title="Toggle Ad Shield">🛡 Shield ON</button>
          </div>
        </div>
        ${langBanner}
        <div id="pwrap"><div class="ploading"><div class="spin"></div>Preparing stream…</div></div>
        <div class="subrow">
          <div class="sublbl">🌐 Subs</div>
          <select class="subsel" id="subsel" onchange="changeSubLang(this.value)">${subLangs.map(l=>`<option value="${l.v}">${l.l}</option>`).join('')}</select>
          <div class="subnote">best on VidLink & LetsEmbed</div>
        </div>
        ${epHtml}
      </div>
    </div>`;

  getImdb(id,type).then(r=>{const el=document.getElementById('mImdb');if(el&&r)el.textContent=`IMDb ${r}`;});
  if(type==='tv') await loadEps(curSeason,det);
  updatePlayer();
  addHist({id,type,title,backdrop:det.backdrop_path,prog:0});
}

function closeModal(){
  document.getElementById('moverlay').classList.remove('open');
  const pw=document.getElementById('pwrap');
  if(pw) pw.innerHTML='<div class="ploading"><div class="spin"></div></div>';
}

// ════════════════════════════════════
// PLAYER -- no sandbox, just direct iframe
// ════════════════════════════════════
function updatePlayer(){
  const pw=document.getElementById('pwrap');
  if(!pw||!curMedia)return;
  pw.innerHTML=`<div class="ploading"><div class="spin"></div><div>Loading ${SOURCES[curSrcIdx].label}…</div></div>`;
  const{id,type}=curMedia;
  const url=SOURCES[curSrcIdx].fn(id,type,curSeason,curEp,curSubLang);
  // Update external link
  const ext=document.getElementById('extBtn');
  if(ext) ext.href=url;
  setTimeout(()=>{
    const f=document.createElement('iframe');
    f.className='pframe';
    f.setAttribute('allowfullscreen','');
    f.setAttribute('allow','fullscreen;autoplay;encrypted-media;picture-in-picture');
    f.setAttribute('referrerpolicy','strict-origin-when-cross-origin');
    // NO sandbox -- required for video players to work
    f.src=url;
    pw.innerHTML='';pw.appendChild(f);
  },350);
  if(type==='tv'){
    progress[id]={season:curSeason,episode:curEp,ts:Date.now()};
    localStorage.setItem('sv_progress',JSON.stringify(progress));
    updHistEp(id,curSeason,curEp);
  }
}

function switchSrc(idx,el){
  curSrcIdx=idx;failCnt=0;curSubLang='';
  document.querySelectorAll('.srcbtn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  // reset subtitle
  const ss=document.getElementById('subsel');if(ss)ss.value='';
  // update external link
  const{id,type}=curMedia;
  const url=SOURCES[idx].fn(id,type,curSeason,curEp,'');
  const ext=document.getElementById('extBtn');if(ext)ext.href=url;
  updatePlayer();
  showToast(`▶ ${SOURCES[idx].label} -- Supports: ${SOURCES[idx].langs.map(l=>langName(l)).join(', ')}`);
}

function changeSubLang(val){
  curSubLang=val;
  const{id,type}=curMedia;
  const src=SOURCES[curSrcIdx];
  let url=src.fn(id,type,curSeason,curEp,val);
  const f=document.querySelector('.pframe');
  if(f){f.src='';setTimeout(()=>{f.src=url;},100);}
  showToast(val?`Subtitles: ${langName(val)}`:'Default subtitles');
}

// ════════════════════════════════════
// EPISODES
// ════════════════════════════════════
async function changeSeason(s){curSeason=s;curEp=1;await loadEps(s,curMedia.det);updatePlayer();}

async function loadEps(season,det){
  const g=document.getElementById('epg');if(!g)return;
  g.innerHTML='<span style="color:var(--text2);font-size:.73rem">Loading…</span>';
  const sd=await api(`/tv/${curMedia.id}/season/${season}`);
  const eps=sd.episodes||[];
  const sv=progress[curMedia.id]||{};
  g.innerHTML=eps.map(e=>{
    const w=sv.season===season&&e.episode_number<(sv.episode||0);
    return `<button class="epbtn${e.episode_number===curEp?' active':''}${w?' watched':''}" onclick="selEp(${e.episode_number},this)">E${e.episode_number}</button>`;
  }).join('');
}

function selEp(ep,el){
  curEp=ep;document.querySelectorAll('.epbtn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');updatePlayer();
}

// TRAILER
// ════════════════════════════════════
async function openTrailer(id,type){
  const vids=curMedia?.vids||(await api(`/${type}/${id}/videos`));
  const res=vids.results||[];
  const t=res.find(v=>v.type==='Trailer'&&v.site==='YouTube')||res.find(v=>v.site==='YouTube');
  if(!t){showToast('No trailer available');return;}
  document.getElementById('tframe').src=`https://www.youtube.com/embed/${t.key}?autoplay=1`;
  document.getElementById('toverlay').classList.add('open');
}
function closeTrailer(){document.getElementById('toverlay').classList.remove('open');document.getElementById('tframe').src='';}

// PERSON
// ════════════════════════════════════
async function openPerson(id,name){

// WATCHLIST
// ════════════════════════════════════
function isInWL(id){return watchlist.some(w=>+w.id===+id)}
function toggleWL(item){
  item.id=+item.id;
  const was=isInWL(item.id);
  watchlist=was?watchlist.filter(w=>+w.id!==item.id):[item,...watchlist];
  localStorage.setItem('sv_watchlist',JSON.stringify(watchlist));
  showToast(was?'Removed from watchlist':'⭐ Added to watchlist!');
  const mb=document.getElementById('mFav');
  if(mb){mb.className='mbtn'+(isInWL(item.id)?' saved':'');mb.textContent=isInWL(item.id)?'★ Saved':'☆ Watchlist';}
  const hb=document.getElementById('heroFav');
  if(hb){hb.className='btn-fav'+(isInWL(item.id)?' saved':'');hb.textContent=isInWL(item.id)?'★ Saved':'☆ Save';}
}

function addHist(item){
  item.id=+item.id;history2=history2.filter(h=>+h.id!==item.id);
  history2.unshift(item);history2=history2.slice(0,20);
  localStorage.setItem('sv_history',JSON.stringify(history2));
}

  const h=history2.find(x=>+x.id===+id);
  if(h){h.lastSeason=s;h.lastEp=e;localStorage.setItem('sv_history',JSON.stringify(history2));}
}
function removeCw(id){
  history2=history2.filter(h=>String(h.id)!==String(id));
  localStorage.setItem('sv_history',JSON.stringify(history2));loadMC();
}

async function doSearch(q){
  const d=await api('/search/multi',`&query=${encodeURIComponent(q)}`);
  const dr=document.getElementById('srDrop');
  const items=d.results.filter(i=>(i.media_type==='movie'||i.media_type==='tv')&&(i.poster_path||i.backdrop_path)).slice(0,7);
  if(!items.length){dr.innerHTML='<div style="padding:1rem;color:var(--text2);font-size:.8rem;text-align:center">Nothing found</div>';dr.classList.add('open');return;}
  dr.innerHTML=items.map(i=>{
    const t=i.title||i.name||'',y=(i.release_date||i.first_air_date||'').slice(0,4);
    return `<div class="sr-item" onclick="document.getElementById('srDrop').classList.remove('open');document.getElementById('searchInput').value='';openModal(${i.id},'${i.media_type}',decodeURIComponent('${encodeURIComponent(t)}'))">
      <img class="sr-img" src="${i.poster_path?IMG+'w92'+i.poster_path:''}" onerror="this.style.display='none'" loading="lazy"/>
      <div class="sr-info"><div class="sr-title">${t}</div><div class="sr-meta">${y} · ★${i.vote_average?.toFixed(1)||'?'}</div></div>
      <span class="sr-badge ${i.media_type}">${i.media_type==='tv'?'TV':'FILM'}</span>
    </div>`;
  }).join('');
  dr.classList.add('open');
}

// LOGOUT
// ════════════════════════════════════
async function doLogout(){
  if(!confirm('Log out?')) return;
  await fetch('/api/auth',{method:'DELETE'});
  window.location.href='/login.html';
}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
(async()=>{
  // ── Auth gate: verify session with server before loading ──
  try{
    const authCheck = await fetch('/api/check');
    if(!authCheck.ok){
      // Not authenticated — redirect to login
      window.location.href = '/login.html?from=' + encodeURIComponent(window.location.pathname);
      return;
    }
  }catch(e){
    // Network error — still try to load, proxy will catch unauth requests
    console.warn('Auth check failed:', e.message);
  }

  // ── Load app ──
  const th=localStorage.getItem('sv_theme')||'dark';
  document.documentElement.setAttribute('data-theme',th);
  document.querySelectorAll('.topt').forEach(el=>el.classList.toggle('active',el.textContent.trim().toLowerCase().startsWith(th)));
  try{await loadGenres();await Promise.all([loadHero(),loadMC()]);}
  catch(e){console.error(e);showErr(e.message);}
})();

// ════════════════════════════════════
// AD REDIRECT INTERCEPTOR
// Catches popup/redirect attempts that
// escape from iframe to parent scope
// ════════════════════════════════════
(function installAdShield(){

  let blockedCount = 0;
  let adShieldOn = JSON.parse(localStorage.getItem('sv_adshield') ?? 'true');

  // ── 1. Override window.open ──────────────────
  // Any popup spawned at parent-page scope gets swallowed
  const _origOpen = window.open.bind(window);
  window.open = function(url, target, features) {
    if (!adShieldOn) return _origOpen(url, target, features);
    // Allow YouTube embeds (trailers)
    if (url && url.includes('youtube.com')) return _origOpen(url, target, features);
    // Allow intentional external opens (our ↗ button uses target=_blank on <a>)
    if (target === '_svopen') return _origOpen(url, '_blank', features);
    // Everything else → swallow silently
    blockedCount++;
    updateShieldBadge();
    showToast(`🛡 Ad blocked (${blockedCount})`);
    // Return a fake window object so scripts don't crash
    return { closed: true, close: ()=>{}, focus: ()=>{}, location: { href: '' } };
  };

  // ── 2. beforeunload guard ────────────────────
  // If anything tries to navigate the main page away, catch it
  window.addEventListener('beforeunload', (e) => {
    if (!adShieldOn) return;
    // If modal is open, a redirect is almost certainly an ad
    const modalOpen = document.getElementById('moverlay')?.classList.contains('open');
    if (modalOpen) {
      e.preventDefault();
      e.returnValue = '';
      showToast('🛡 Redirect blocked!');
      blockedCount++;
      updateShieldBadge();
      return '';
    }
  });

  // ── 3. visibilitychange -- background tab detector ───
  // When page goes hidden while modal is open = background tab likely opened
  let _lastVisible = Date.now();
  document.addEventListener('visibilitychange', () => {
    if (!adShieldOn) return;
    const modalOpen = document.getElementById('moverlay')?.classList.contains('open');
    if (document.hidden && modalOpen) {
      // Page went to background -- likely an ad tab opened
      blockedCount++;
      updateShieldBadge();
      showToast('🛡 Background tab detected -- switch back here');
      // Refocus when user returns
      const onReturn = () => {
        if (!document.hidden) {
          document.removeEventListener('visibilitychange', onReturn);
          showToast('🛡 Back! ' + blockedCount + ' ad(s) intercepted this session');
        }
      };
      document.addEventListener('visibilitychange', onReturn);
    }
  });

  // ── 4. window.blur guard ─────────────────────
  let _blurTimer = null;
  window.addEventListener('blur', () => {
    if (!adShieldOn) return;
    const modalOpen = document.getElementById('moverlay')?.classList.contains('open');
    if (modalOpen) {
      // Something stole focus -- likely a popup
      _blurTimer = setTimeout(() => {
        // Try to reclaim focus
        window.focus();
      }, 150);
    }
  });
  window.addEventListener('focus', () => clearTimeout(_blurTimer));

  // ── 5. Shield badge in player header ─────────
  function updateShieldBadge() {
    const badge = document.getElementById('adShieldBadge');
    if (badge) {
      badge.textContent = adShieldOn
        ? (blockedCount > 0 ? `🛡 ${blockedCount} blocked` : '🛡 Shield ON')
        : '🛡 Shield OFF';
      badge.style.color = adShieldOn ? '#22c55e' : 'var(--muted)';
    }
  }

  // ── 6. Toggle function (called from UI button) ─
  window.toggleAdShield = function() {
    adShieldOn = !adShieldOn;
    localStorage.setItem('sv_adshield', JSON.stringify(adShieldOn));
    updateShieldBadge();
    showToast(adShieldOn ? '🛡 Ad Shield ON' : '🛡 Ad Shield OFF');
  };

  window.getAdShieldOn = () => adShieldOn;
  window.resetAdCount = () => { blockedCount = 0; updateShieldBadge(); };

  // Init badge after DOM ready
  document.addEventListener('DOMContentLoaded', updateShieldBadge);
  
  // ── 7. Also update when modal opens (badge is inside modal) ──
  const _origOpenModal = window.openModal;
  window.openModal = async function(...args) {
    if (typeof _origOpenModal === 'function') {
      await _origOpenModal.apply(this, args);
    }
    // Small timeout to ensure the DOM has updated the modal content
    setTimeout(updateShieldBadge, 50);
  };

})();
