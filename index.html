<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• THEMES â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
:root,[data-theme="dark"]{
  --bg:#080b10;--bg2:#0e1219;--bg3:#141924;--card:#111622;
  --border:rgba(255,255,255,0.07);--accent:#e63946;--accent2:#ff6b6b;
  --gold:#f4a261;--text:#e8eaf0;--muted:#6b7280;--r:10px;
  --shadow:0 8px 32px rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaed;--card:#ffffff;
  --border:rgba(0,0,0,0.1);--accent:#e63946;--accent2:#ff6b6b;
  --gold:#e07b39;--text:#111827;--muted:#6b7280;
  --shadow:0 8px 32px rgba(0,0,0,.12);
}
[data-theme="amoled"]{
  --bg:#000000;--bg2:#0a0a0a;--bg3:#111111;--card:#0d0d0d;
  --border:rgba(255,255,255,0.06);--accent:#e63946;--accent2:#ff6b6b;
  --gold:#f4a261;--text:#e8eaf0;--muted:#555f6e;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#2a3040;border-radius:3px}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• HEADER â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 1.5rem;height:60px;display:flex;align-items:center;gap:1rem;background:linear-gradient(180deg,rgba(8,11,16,.98) 0%,rgba(8,11,16,.85) 100%);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);transition:background .3s}
[data-theme="light"] header{background:rgba(240,242,245,.95)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;user-select:none;flex-shrink:0}
.search-wrap{position:relative;flex:1;max-width:440px}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:.5rem 1rem .5rem 2.6rem;color:var(--text);font-size:.88rem;font-family:inherit;outline:none;transition:all .2s}
.search-wrap input:focus{border-color:rgba(230,57,70,.5);box-shadow:0 0 0 3px rgba(230,57,70,.1)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-height:400px;overflow-y:auto;z-index:999;box-shadow:var(--shadow);display:none}
.search-results.open{display:block}
.sr-item{display:flex;align-items:center;gap:.7rem;padding:.6rem 1rem;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover,.sr-item:active{background:rgba(255,255,255,.05)}
.sr-img{width:36px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg3)}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.sr-badge{font-size:.62rem;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
.sr-badge.movie{background:rgba(230,57,70,.2);color:var(--accent)}
.sr-badge.tv{background:rgba(244,162,97,.2);color:var(--gold)}
.header-actions{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;color:var(--muted);transition:all .2s;flex-shrink:0}
.icon-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.icon-btn.active{color:var(--accent);border-color:rgba(230,57,70,.3);background:rgba(230,57,70,.1)}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• NAV â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
nav.tabs{display:flex;gap:.2rem;overflow-x:auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.82rem;font-weight:500;padding:.38rem .75rem;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.tab-btn.active{color:var(--accent);background:rgba(230,57,70,.12)}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• MOBILE NAV â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:var(--bg2);border-top:1px solid var(--border);padding:.5rem 0 .75rem;backdrop-filter:blur(16px)}
.mobile-nav-inner{display:flex;justify-content:space-around}
.mnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:.6rem;font-weight:500;cursor:pointer;padding:.3rem .6rem;border-radius:8px;transition:all .2s;min-width:52px}
.mnav-btn .icon{font-size:1.3rem;line-height:1}
.mnav-btn.active{color:var(--accent)}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• HERO â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
#hero{position:relative;height:72vh;min-height:460px;margin-top:60px;overflow:hidden;cursor:pointer}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity .7s}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,11,16,.95) 0%,rgba(8,11,16,.4) 55%,transparent 100%),linear-gradient(to top,var(--bg) 0%,transparent 45%)}
[data-theme="light"] .hero-gradient{background:linear-gradient(to right,rgba(240,242,245,.95) 0%,rgba(240,242,245,.4) 55%,transparent 100%),linear-gradient(to top,var(--bg) 0%,transparent 45%)}
.hero-content{position:absolute;bottom:0;left:0;padding:2.5rem 2rem 3rem;max-width:540px;z-index:2}
.hero-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;letter-spacing:1.5px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:.5rem;background:rgba(230,57,70,.1);padding:3px 8px;border-radius:4px;border:1px solid rgba(230,57,70,.2)}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,4rem);line-height:1;letter-spacing:2px;margin-bottom:.6rem}
.hero-meta{display:flex;gap:.75rem;align-items:center;margin-bottom:.6rem;flex-wrap:wrap}
.hero-rating{display:flex;align-items:center;gap:.3rem;font-weight:600;font-size:.88rem}
.tmdb-rating{color:#01d277}
.imdb-rating{color:#f5c518;background:rgba(245,197,24,.1);padding:2px 6px;border-radius:3px;font-size:.78rem;font-weight:700}
.hero-year,.hero-runtime{color:var(--muted);font-size:.82rem}
.genre-chips{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.genre-chip{font-size:.68rem;padding:2px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
.hero-desc{color:rgba(232,234,240,.75);font-size:.87rem;line-height:1.6;max-width:460px;margin-bottom:1.2rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
[data-theme="light"] .hero-desc{color:rgba(17,24,39,.7)}
.hero-actions{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.btn-play{display:inline-flex;align-items:center;gap:.45rem;background:var(--accent);color:#fff;font-family:inherit;font-size:.88rem;font-weight:600;padding:.6rem 1.4rem;border-radius:8px;border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(230,57,70,.4)}
.btn-play:hover,.btn-play:active{background:var(--accent2);transform:translateY(-1px)}
.btn-trailer{display:inline-flex;align-items:center;gap:.45rem;background:rgba(255,255,255,.12);color:var(--text);font-family:inherit;font-size:.88rem;font-weight:500;padding:.6rem 1.2rem;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.btn-trailer:hover{background:rgba(255,255,255,.18)}
.btn-fav{display:inline-flex;align-items:center;gap:.35rem;background:transparent;color:var(--muted);font-family:inherit;font-size:.88rem;padding:.6rem .9rem;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.btn-fav.saved{color:var(--gold);border-color:rgba(244,162,97,.3);background:rgba(244,162,97,.08)}
.hero-dots{position:absolute;bottom:1.2rem;right:1.5rem;display:flex;gap:.4rem;z-index:2}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);cursor:pointer;transition:all .3s}
.hero-dot.active{background:var(--accent);width:18px;border-radius:3px}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• MAIN â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
main{padding:0 1.5rem 5rem}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• SECTIONS â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin:2.2rem 0 1rem}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1.5px}
.section-title span{color:var(--accent)}
.see-all{font-size:.75rem;color:var(--muted);cursor:pointer;padding:.28rem .65rem;border-radius:5px;border:1px solid var(--border);background:none;font-family:inherit;transition:all .2s}
.see-all:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• CARD ROW â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.card-row{display:flex;gap:.85rem;overflow-x:auto;padding-bottom:.75rem;scroll-snap-type:x mandatory;-ms-overflow-style:none;scrollbar-width:none}
.card-row::-webkit-scrollbar{display:none}
.card{flex-shrink:0;width:140px;cursor:pointer;transition:transform .2s;scroll-snap-align:start}
.card:hover{transform:translateY(-4px)}
.card-poster{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:2/3;background:var(--bg3)}
.card-poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-poster img{transform:scale(1.04)}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 60%);opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.card:hover .card-overlay{opacity:1}
.card-play{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#fff;box-shadow:0 4px 16px rgba(230,57,70,.5);margin-bottom:2rem}
.card-fav-btn{position:absolute;top:.4rem;left:.4rem;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:26px;height:26px;font-size:.65rem;cursor:pointer;color:var(--muted);display:none;align-items:center;justify-content:center;transition:all .2s;z-index:2}
.card:hover .card-fav-btn,.card-fav-btn.saved{display:flex}
.card-fav-btn.saved{color:var(--gold)}
.card-rating{position:absolute;top:.4rem;right:.4rem;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);border-radius:4px;padding:2px 5px;font-size:.65rem;font-weight:600;display:flex;align-items:center;gap:2px}
.card-tmdb{color:#01d277}
.card-imdb{color:#f5c518}
.card-type{position:absolute;bottom:.4rem;left:.4rem;font-size:.58rem;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.5px}
.card-type.tv{background:var(--gold);color:#000}
.card-type.movie{background:var(--accent);color:#fff}
.card-info{margin-top:.45rem}
.card-title{font-size:.78rem;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-year{font-size:.68rem;color:var(--muted);margin-top:1px}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• WIDE CARD â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.wide-card{flex-shrink:0;width:260px;cursor:pointer;border-radius:var(--r);overflow:hidden;aspect-ratio:16/9;scroll-snap-align:start;position:relative}
.wide-card img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.wide-card:hover img{transform:scale(1.03)}
.wide-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:.65rem}
.wide-card-title{font-weight:600;font-size:.82rem}
.wide-card-meta{font-size:.7rem;color:var(--muted);margin-top:2px}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• GRID â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.85rem}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• FILTERS â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.filter-bar{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin:1.2rem 0;padding:1rem 1.2rem;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border)}
.filter-group{display:flex;flex-direction:column;gap:.3rem;flex:1;min-width:120px}
.filter-label{font-size:.68rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.filter-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.8rem;padding:.38rem .7rem;border-radius:6px;cursor:pointer;outline:none;transition:border .2s}
.filter-select:focus{border-color:rgba(230,57,70,.4)}
.filter-range{display:flex;align-items:center;gap:.4rem;font-size:.78rem}
.filter-range input{flex:1;accent-color:var(--accent)}
.filter-range span{color:var(--accent);font-weight:600;min-width:28px;text-align:center}
.filter-apply{background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:.8rem;font-weight:600;padding:.42rem 1rem;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;align-self:flex-end}
.filter-apply:hover{background:var(--accent2)}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• GENRE PILLS â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
.genre-row{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.4rem;margin-bottom:.75rem;scrollbar-width:none}
.genre-row::-webkit-scrollbar{display:none}
.gp{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.75rem;padding:.35rem .85rem;border-radius:999px;cursor:pointer;transition:all .2s;font-weight:500}
.gp:hover{color:var(--text)}
.gp.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• MODAL â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
#modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:16px;border:1px solid var(--border);width:100%;max-width:880px;overflow:hidden;position:relative;animation:modalIn .25s ease;margin:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:.85rem;right:.85rem;z-index:10;background:rgba(0,0,0,.65);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:.9rem;transition:all .2s}
.modal-close:hover{background:var(--accent);border-color:var(--accent)}
.modal-backdrop{position:relative;width:100%;height:260px;overflow:hidden}
.modal-backdrop img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.modal-backdrop-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg2) 0%,transparent 60%),linear-gradient(to right,var(--bg2) 0%,transparent 45%)}
.modal-body{padding:0 1.4rem 1.4rem;margin-top:-70px;position:relative}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;line-height:1}
.modal-meta{display:flex;gap:.6rem;align-items:center;margin:.45rem 0 .85rem;flex-wrap:wrap}
.modal-tmdb{color:#01d277;font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:.25rem}
.modal-imdb-badge{background:#f5c518;color:#000;font-weight:700;font-size:.72rem;padding:2px 7px;border-radius:3px}
.modal-year,.modal-runtime,.modal-lang{color:var(--muted);font-size:.82rem}
.modal-dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
.modal-genres{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.85rem}
.modal-genre-tag{font-size:.7rem;padding:2px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
.modal-desc{color:rgba(232,234,240,.8);font-size:.86rem;line-height:1.65;margin-bottom:1.2rem}
[data-theme="light"] .modal-desc{color:rgba(17,24,39,.75)}
.modal-actions{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
.modal-fav-btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.82rem;padding:.5rem 1rem;border-radius:7px;cursor:pointer;transition:all .2s}
.modal-fav-btn.saved{color:var(--gold);border-color:rgba(244,162,97,.3);background:rgba(244,162,97,.08)}
.modal-trailer-btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.82rem;padding:.5rem 1rem;border-radius:7px;cursor:pointer;transition:all .2s}
.modal-trailer-btn:hover{border-color:rgba(255,255,255,.2)}

/* CAST */
.cast-section{margin-bottom:1.2rem}
.cast-title{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:.65rem}
.cast-row{display:flex;gap:.6rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.3rem}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{flex-shrink:0;width:70px;cursor:pointer;text-align:center}
.cast-card img{width:70px;height:70px;object-fit:cover;border-radius:50%;background:var(--bg3);border:2px solid var(--border);transition:border-color .2s}
.cast-card:hover img{border-color:var(--accent)}
.cast-name{font-size:.65rem;margin-top:.35rem;line-height:1.3;color:var(--text)}
.cast-char{font-size:.6rem;color:var(--muted)}

/* PLAYER */
.player-section{background:var(--bg3);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.player-header{padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.4rem}
.player-label{font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.5px}
.source-btns{display:flex;gap:.3rem;flex-wrap:wrap}
.src-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.7rem;padding:.28rem .65rem;border-radius:5px;cursor:pointer;transition:all .2s;font-weight:500;display:flex;align-items:center;gap:.25rem}
.src-btn:hover{color:var(--text)}
.src-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.src-btn .quality{font-size:.58rem;background:rgba(255,255,255,.2);padding:1px 4px;border-radius:2px}
.player-frame{width:100%;aspect-ratio:16/9;border:none;display:block;background:#000}
.player-loading{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:#000;flex-direction:column;gap:.75rem;color:var(--muted);font-size:.85rem}
.player-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EPISODE SELECTOR */
.ep-selector{padding:.75rem 1rem;border-top:1px solid var(--border)}
.ep-selector-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:.4rem}
.ep-label{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.autoplay-toggle{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted);cursor:pointer;user-select:none}
.autoplay-toggle input{accent-color:var(--accent);cursor:pointer}
.season-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.78rem;padding:.32rem .65rem;border-radius:6px;cursor:pointer;outline:none;margin-bottom:.5rem}
.ep-grid{display:flex;gap:.35rem;flex-wrap:wrap;max-height:110px;overflow-y:auto}
.ep-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:.7rem;padding:.28rem .5rem;border-radius:5px;cursor:pointer;transition:all .15s;font-family:inherit;min-width:34px;text-align:center;position:relative}
.ep-btn:hover{color:var(--text)}
.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ep-btn.watched::after{content:'';position:absolute;bottom:2px;right:2px;width:5px;height:5px;border-radius:50%;background:var(--gold)}

/* SUBTITLE/LANG ROW */
.sub-lang-row{padding:.6rem 1rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.sub-lang-label{font-size:.7rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.sub-lang-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.75rem;padding:.28rem .6rem;border-radius:5px;cursor:pointer;outline:none}
.sub-note{font-size:.68rem;color:var(--muted);font-style:italic}

/* TRAILER MODAL */
#trailer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:3000;display:none;align-items:center;justify-content:center;padding:1rem}
#trailer-overlay.open{display:flex}
.trailer-inner{width:100%;max-width:860px;position:relative}
.trailer-close{position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:.3rem}
.trailer-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:10px}

/* WATCHLIST PAGE */
.watchlist-empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.watchlist-empty .icon{font-size:3rem;margin-bottom:1rem}
.watchlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.85rem}

/* THEME SWITCHER */
.theme-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:999;box-shadow:var(--shadow);min-width:150px;display:none}
.theme-menu.open{display:block}
.theme-opt{display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem;cursor:pointer;font-size:.82rem;transition:background .15s}
.theme-opt:hover{background:rgba(255,255,255,.06)}
.theme-opt.active{color:var(--accent)}
.theme-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* CONTINUE WATCHING */
.cw-item{flex-shrink:0;width:190px;cursor:pointer;border-radius:var(--r);overflow:hidden;position:relative;scroll-snap-align:start}
.cw-item img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.cw-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%);padding:.5rem}
.cw-title{position:absolute;bottom:.5rem;left:.5rem;right:1.8rem;font-size:.75rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cw-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15)}
.cw-progress-fill{height:100%;background:var(--accent)}
.cw-del{position:absolute;top:.35rem;right:.35rem;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:22px;height:22px;font-size:.62rem;cursor:pointer;color:var(--muted);display:none;align-items:center;justify-content:center}
.cw-item:hover .cw-del{display:flex}

/* TOAST */
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(30px);background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:.6rem 1.4rem;font-size:.82rem;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{width:140px;flex-shrink:0}
.skel-poster{aspect-ratio:2/3;border-radius:var(--r)}
.skel-line{height:.65rem;border-radius:4px;margin-top:.45rem}

/* PERSON MODAL */
.person-modal-body{padding:1.5rem}
.person-header{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1.2rem}
.person-img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--border);flex-shrink:0}
.person-info .name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1.5px}
.person-info .known{font-size:.8rem;color:var(--muted);margin-top:.2rem}
.person-bio{font-size:.84rem;color:rgba(232,234,240,.75);line-height:1.65;margin-bottom:1.2rem;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}

/* RESPONSIVE */
@media(max-width:680px){
  header{padding:0 .85rem;gap:.6rem}
  .logo{font-size:1.4rem}
  nav.tabs{display:none}
  .mobile-nav{display:block}
  main{padding:0 .85rem 5.5rem}
  #hero{height:65vmax;min-height:400px}
  .hero-content{padding:1.5rem 1rem 2.5rem;max-width:100%}
  .hero-title{font-size:1.9rem}
  .hero-desc{-webkit-line-clamp:2}
  .card{width:120px}
  .skel-card{width:120px}
  .media-grid{grid-template-columns:repeat(auto-fill,minmax(108px,1fr))}
  .modal-backdrop{height:200px}
  .modal-title{font-size:1.7rem}
  .filter-bar{gap:.5rem}
  .cw-item{width:160px}
}

async function api(path,params=''){
  const url=`${TMDB}${path}?language=en-US${params}`;
  try{
    const r=await fetch(url,{method:'GET',headers:{Accept:'application/json',Authorization:`Bearer ${TMDB_TOKEN}`}});
    if(r.ok) return r.json();
  }catch(e){}
  try{
    const r2=await fetch(`${TMDB}${path}?api_key=${TMDB_KEY}&language=en-US${params}`);
    if(r2.ok) return r2.json();
  }catch(e){}
  const r3=await fetch(`https://corsproxy.io/?${encodeURIComponent(`${TMDB}${path}?api_key=${TMDB_KEY}&language=en-US${params}`)}`);
  if(!r3.ok) throw new Error('API failed');
  return r3.json();
}

async function loadGenres(){
  const[mg,tg]=await Promise.all([api('/genre/movie/list'),api('/genre/tv/list')]);
  mg.genres.forEach(g=>genres.movie[g.id]=g.name);
  tg.genres.forEach(g=>genres.tv[g.id]=g.name);
}
function genreNames(ids,type){return(ids||[]).slice(0,3).map(id=>genres[type][id]).filter(Boolean)}

async function getImdbRating(tmdbId,type){
  if(imdbCache[tmdbId]) return imdbCache[tmdbId];
  try{
    const d=await api(`/${type}/${tmdbId}/external_ids`);
    if(!d.imdb_id) return null;
    // Use OMDB free tier for IMDb rating
    const r=await fetch(`https://www.omdbapi.com/?i=${d.imdb_id}&apikey=trilogy`);
    const j=await r.json();
    const rating=j.imdbRating&&j.imdbRating!=='N/A'?j.imdbRating:null;
    imdbCache[tmdbId]=rating;
    return rating;
  }catch(e){return null;}
}

function switchTab(tab,el){
  currentTab=tab;
  activeGenre=0; filterYear=''; filterRating=0; filterLang='';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  if(el){
    el.classList.add('active');
  } else {
    const mapping={home:0,movies:1,tv:2,trending:3,watchlist:4};
    document.querySelectorAll('.tab-btn')[mapping[tab]||0]?.classList.add('active');
    document.querySelectorAll('.mnav-btn')[mapping[tab]||0]?.classList.add('active');
  }
  document.getElementById('hero').style.display=tab==='home'?'block':'none';
  loadMainContent();
}

async function loadBrowseGrid(type,grid){
  grid.innerHTML=Array(20).fill(`<div class="skel-card"><div class="skeleton skel-poster"></div><div class="skeleton skel-line" style="width:75%"></div></div>`).join('');
  let params=activeGenre?`&with_genres=${activeGenre}`:'';
  if(filterYear) params+=`&primary_release_year=${filterYear}&first_air_date_year=${filterYear}`;
  if(filterRating) params+=`&vote_average.gte=${filterRating}`;
  if(filterLang) params+=`&with_original_language=${filterLang}`;
  const d=await api(`/discover/${type}`,`&sort_by=popularity.desc${params}`);
  grid.innerHTML='';
  d.results.forEach(item=>{
    if(!item.poster_path) return;
    const t=item.title||item.name||'';
    const y=(item.release_date||item.first_air_date||'').substring(0,4);
    const inWL=isInWatchlist(item.id);
    const el=document.createElement('div'); el.className='card';
    el.innerHTML=`
      <div class="card-poster">
        <img src="${IMG}w342${item.poster_path}" loading="lazy" alt="${t}"/>
        <div class="card-overlay"><div class="card-play">â–¶</div></div>
        <button class="card-fav-btn${inWL?' saved':''}" onclick="event.stopPropagation();toggleWatchlist({id:${item.id},type:'${type}',title:'${t.replace(/'/g,"\\'")}',poster:'${item.poster_path}',year:'${y}'})">${inWL?'â˜…':'â˜†'}</button>
        <div class="card-rating"><span class="card-tmdb">â˜…${item.vote_average?.toFixed(1)||'?'}</span></div>
        <div class="card-type ${type}">${type==='tv'?'TV':'FILM'}</div>
      </div>
      <div class="card-info"><div class="card-title">${t}</div><div class="card-year">${y}</div></div>
    `;
    el.onclick=()=>openModal(item.id,type,t);
    grid.appendChild(el);
  });
}

function applyBrowseFilter(type){
  filterYear=document.getElementById('fyear').value;

async function openModal(id,type,titleHint){
  const overlay=document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.getElementById('modalContent').innerHTML=`<div style="padding:4rem;text-align:center;color:var(--muted)"><div class="player-spinner" style="margin:0 auto"></div></div>`;

  currentMedia={id,type,details,videos};
  const title=details.title||details.name||titleHint;
  const year=(details.release_date||details.first_air_date||'').substring(0,4);
  const runtime=type==='movie'?(details.runtime?`${details.runtime}m`:''):(details.episode_run_time?.[0]?`~${details.episode_run_time[0]}m/ep`:'');
  const gs=(details.genres||[]).map(g=>`<span class="modal-genre-tag">${g.name}</span>`).join('');

            <div class="cast-name">${c.name}</div>

    </button>`).join('');

  // Subtitle languages
  const subLangs=[{v:'',l:'Default'},{v:'en',l:'English'},{v:'es',l:'EspaÃ±ol'},{v:'fr',l:'FranÃ§ais'},{v:'de',l:'Deutsch'},{v:'ar',l:'Arabic'},{v:'pt',l:'Portuguese'},{v:'hi',l:'Hindi'},{v:'ja',l:'Japanese'},{v:'ko',l:'Korean'},{v:'zh',l:'Chinese'}];
  const subRow=`

      <div class="sub-lang-label">ðŸŒ Subtitles</div>

    </div>`;

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-backdrop">
      <img src="${IMG}w1280${details.backdrop_path||details.poster_path}" onerror="this.style.display='none'"/>
      <div class="modal-backdrop-grad"></div>
    </div>

      <div class="modal-meta">
        <span class="modal-tmdb">TMDB â˜… ${details.vote_average?.toFixed(1)||'N/A'}</span>
        <div class="modal-dot"></div>

  const wrap=document.getElementById('playerWrap');
  if(!wrap||!currentMedia) return;
  wrap.innerHTML=`<div class="player-loading"><div class="player-spinner"></div><div>Loading...</div></div>`;
  const{id,type}=currentMedia;
  const src=SOURCES[currentSourceIdx];
  const url=src.fn(id,type,currentSeason,currentEpisode);
  setTimeout(()=>{
    const f=document.createElement('iframe');
    f.id='playerFrame'; f.className='player-frame';
    f.allowFullscreen=true; f.allow='fullscreen';
    f.src=url;
    f.onerror=()=>autoSwitchSource();
    wrap.innerHTML=''; wrap.appendChild(f);
  },300);
  // Save progress
  if(type==='tv'){
    watchProgress[id]={season:currentSeason,episode:currentEpisode,ts:Date.now()};
    localStorage.setItem('sv_progress',JSON.stringify(watchProgress));
    updateHistoryEpisode(id,currentSeason,currentEpisode);
  }
}

function switchSource(idx,el){
  currentSourceIdx=idx;
  sourceFailCount=0;
  document.querySelectorAll('.src-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  updatePlayer();
  showToast(`Switched to ${SOURCES[idx].label}`);
}

function autoSwitchSource(){
  sourceFailCount++;
  if(sourceFailCount<SOURCES.length){
    currentSourceIdx=(currentSourceIdx+1)%SOURCES.length;
    const btns=document.querySelectorAll('.src-btn');
    btns.forEach(b=>b.classList.remove('active'));
    btns[currentSourceIdx]?.classList.add('active');
    showToast(`âš¡ Auto-switching to ${SOURCES[currentSourceIdx].label}...`);
    updatePlayer();
  } else {
    showToast('âš ï¸ All sources failed. Try again later.');
  }
}

function changeSubLang(val){
  // Subtitles depend on the embed source; we update the URL with sub param where supported
  const{id,type}=currentMedia;
  const src=SOURCES[currentSourceIdx];
  let url=src.fn(id,type,currentSeason,currentEpisode);
  if(val && src.id==='vidlink') url+=`&dsub=true&sub_lang=${val}`;
  const f=document.getElementById('playerFrame');
  if(f) f.src=url;
  showToast(val?`Subtitles: ${val.toUpperCase()}`:'Subtitles: Default');
}

async function changeSeason(s){
  currentSeason=s; currentEpisode=1;
  await loadEpisodes(s,currentMedia.details);
  updatePlayer();
}

async function loadEpisodes(season,details){
  const grid=document.getElementById('epGrid'); if(!grid) return;
  grid.innerHTML='<div style="color:var(--muted);font-size:.75rem">Loading...</div>';
  const sd=await api(`/tv/${currentMedia.id}/season/${season}`);
  const eps=sd.episodes||[];
  const savedProg=watchProgress[currentMedia.id]||{};
  grid.innerHTML=eps.map(e=>{
    const watched=savedProg.season===season&&e.episode_number<(savedProg.episode||0);
    const active=e.episode_number===currentEpisode;
    return `<button class="ep-btn${active?' active':''}${watched?' watched':''}" onclick="selectEpisode(${e.episode_number},this)">E${e.episode_number}</button>`;
  }).join('');
}

function selectEpisode(ep,el){
  currentEpisode=ep;
  document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  updatePlayer();
}

function nextEpisode(){
  if(!currentMedia||currentMedia.type!=='tv') return;
  const grid=document.getElementById('epGrid'); if(!grid) return;
  const btns=[...grid.querySelectorAll('.ep-btn')];
  const ci=btns.findIndex(b=>b.classList.contains('active'));
  if(ci<btns.length-1){
    selectEpisode(currentEpisode+1,btns[ci+1]);
    showToast(`â–¶ Auto-playing Episode ${currentEpisode}`);
  } else {
    showToast('ðŸŽ‰ Season complete!');
  }
}

let searchTimer=null;

  clearTimeout(searchTimer);
  const q=e.target.value.trim();
  if(q.length<2){document.getElementById('searchResults').classList.remove('open');return;}
  searchTimer=setTimeout(()=>doSearch(q),280);
});

async function doSearch(q){
  const d=await api('/search/multi',`&query=${encodeURIComponent(q)}`);
  const res=document.getElementById('searchResults');
  const items=d.results.filter(i=>(i.media_type==='movie'||i.media_type==='tv')&&(i.poster_path||i.backdrop_path)).slice(0,8);
  if(!items.length){res.innerHTML='<div style="padding:1rem;color:var(--muted);font-size:.82rem;text-align:center">No results</div>';res.classList.add('open');return;}
  res.innerHTML=items.map(i=>{
    const t=i.title||i.name||'';
    const y=(i.release_date||i.first_air_date||'').substring(0,4);
    const img=i.poster_path?`${IMG}w92${i.poster_path}`:'';
    return `<div class="sr-item" onclick="document.getElementById('searchResults').classList.remove('open');openModal(${i.id},'${i.media_type}','${t.replace(/'/g,"\\'")}')">
      <img class="sr-img" src="${img}" onerror="this.style.display='none'" loading="lazy"/>
      <div class="sr-info"><div class="sr-title">${t}</div><div class="sr-meta">${y} Â· â˜…${i.vote_average?.toFixed(1)||'?'}</div></div>
      <span class="sr-badge ${i.media_type}">${i.media_type==='tv'?'TV':'FILM'}</span>
    </div>`;
  }).join('');
  res.classList.add('open');
}
